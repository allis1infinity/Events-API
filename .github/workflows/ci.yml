name: Events API CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t events-api:latest .

      - name: Run Docker container
        run: |
          docker run -d -p 5000:5000 --name events-api-container events-api
          sleep 5

      - name: Confirm API is responding
        run: curl http://localhost:5000/api/health

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
            python-version: '3.13'


      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v


