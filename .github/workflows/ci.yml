name: Events API CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t events-api:latest .

      - name: Run Docker container
        run: |
          docker run -d -p 5000:5000 --name events-api-container events-api:latest
          sleep 5

      - name: Confirm API is responding (Smoke Test)
        run: curl -f http://localhost:5000/api/health || exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
            python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v

      - name: Cleanup container
        if: always()
        run: docker rm -f events-api-container

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t events-api:latest .

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag your image
        run: docker tag events-api:latest ${{ secrets.DOCKER_USERNAME }}/events-api:latest

      - name: Push Image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/events-api:latest

      - name: Trigger Render Redeploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Post-deploy Smoke Test
        run: |
          echo "Waiting for Render to deploy..."
          sleep 60 
          curl -f ${{ secrets.RENDER_BASE_URL }}/api/health || exit 1